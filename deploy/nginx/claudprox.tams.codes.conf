# claudprox.tams.codes — landing page (port 4016)
# Pasang sebagai server block TAMBAHAN. Jangan timpa default Nginx.

server {
    listen 80;
    listen [::]:80;
    server_name claudprox.tams.codes;

    # Redirect ke HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name claudprox.tams.codes;

    ssl_certificate     /etc/letsencrypt/live/claudprox.tams.codes/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/claudprox.tams.codes/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4016;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }
}
