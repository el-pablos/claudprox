# api.claudprox.tams.codes — gateway Fastify (port 4015)
#
# WAJIB SSE-friendly:
#   proxy_buffering off       — chunk SSE jangan ditahan
#   proxy_cache off            — jangan di-cache
#   proxy_http_version 1.1    — chunked transfer
#   proxy_read_timeout 300s   — request panjang (sesuai timeout upstream)
#   chunked_transfer_encoding on

server {
    listen 80;
    listen [::]:80;
    server_name api.claudprox.tams.codes;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.claudprox.tams.codes;

    ssl_certificate     /etc/letsencrypt/live/api.claudprox.tams.codes/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.claudprox.tams.codes/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4015;
        proxy_http_version 1.1;

        # SSE-friendly: jangan buffer / cache, biar streaming chunk lewat real-time
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
