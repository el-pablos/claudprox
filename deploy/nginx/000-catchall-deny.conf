# Catch-all default server: tutup koneksi (444) untuk Host header tak dikenal
# atau akses langsung via IP origin. Mencegah fingerprint origin oleh scanner
# (Shodan/Censys) sehingga IP origin tidak bisa di-enumerasi untuk DDoS.
#
# Domain resmi (claudprox / api-claudprox / dashboard-claudprox / admin-claudprox)
# punya server_name spesifik sehingga match lebih dulu dan TIDAK terpengaruh blok ini.
#
# Pasang sebagai default_server. Symlink ke sites-enabled. nginx -t lalu reload.
# Catatan: ssl_reject_handshake butuh nginx >= 1.19.4; di 1.18 cukup snakeoil + return 444.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    return 444;
}
